<section id="newRequest" class="section hidden">
  <div class="request-card">
    <div class="request-header">
      <div>
        <h2>New Translation Request</h2>
        <p>Complete the student information and service details below.</p>
      </div>
      <span class="request-pill">Pending Approval</span>
    </div>

    <div class="form-section-title">Student Information</div>

    <div class="request-grid">
      <input id="lasid" placeholder="LASID">
      <input id="lastName" placeholder="Last Name">
      <input id="firstName" placeholder="First Name">
    </div>

    <div class="form-section-title">Service Information</div>

    <div class="request-grid">
      <select id="schoolSelect">
        <option value="">Choose School</option>
      </select>

      <select id="languageSelect">
        <option value="">Choose Language</option>
      </select>

      <select id="sped">
        <option value="">SPED Y or N</option>
        <option value="Y">Y</option>
        <option value="N">N</option>
      </select>

      <label>
        Service Date
        <input id="serviceDate" type="date">
      </label>
    </div>

    <div class="form-section-title">Request Notes</div>

    <textarea id="requestNotes" placeholder="Enter any details about the translation request..."></textarea>

    <div class="form-actions">
      <button onclick="saveRequest()">Submit Request</button>
      <p id="saveMessage"></p>
    </div>
  </div>
</section>
